version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - JWT_SECRET=local_secret_please_change
      # Use .env override for local development
    env_file:
      - ./backend/.env.example
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

# Note: Azure SQL and Cosmos DB emulators can be added here, 
# but for Azure Cloud-Native development it's often preferred
# to use actual dev cloud resources or managed identities.
